name: "Bug Report"
description: "Report a bug to help us improve"
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "A clear and concise description of the bug"
      placeholder: "Describe what went wrong..."
    validations:
      required: true
  
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to Reproduce"
      description: "Steps to reproduce the behavior"
      placeholder: |
        1. First step
        2. Second step
        3. Third step
    validations:
      required: true
  
  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      description: "What should happen"
      placeholder: "Describe the expected behavior..."
    validations:
      required: true
  
  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
      description: "What actually happened"
      placeholder: "Describe the actual behavior..."
    validations:
      required: true
  
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "System and environment information"
      placeholder: |
        - OS: [e.g., macOS 14.0, Ubuntu 22.04]
        - Python version: [e.g., 3.11.0]
        - Docker version: [if applicable]
    validations:
      required: false
  
  - type: textarea
    id: logs
    attributes:
      label: "Logs"
      description: "Error logs or stack traces (if applicable)"
      placeholder: "Paste error logs or stack trace here..."
      render: shell
    validations:
      required: false
  
  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots"
      description: "Screenshots or recordings (if applicable)"
      placeholder: "Add screenshots or screen recordings here..."
    validations:
      required: false
