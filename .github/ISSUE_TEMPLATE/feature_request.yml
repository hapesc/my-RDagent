name: "Feature Request"
description: "Suggest a new feature or enhancement"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature_description
    attributes:
      label: "Feature Description"
      description: "A clear and concise description of what you want to be added"
      placeholder: "Describe the feature you would like to see..."
    validations:
      required: true
  
  - type: textarea
    id: use_case
    attributes:
      label: "Use Case"
      description: "Explain the use case and why this feature would be useful"
      placeholder: "Describe the problem this feature would solve or the value it would provide..."
    validations:
      required: true
  
  - type: textarea
    id: alternative_solutions
    attributes:
      label: "Alternative Solutions"
      description: "Describe any alternative solutions or features you've considered"
      placeholder: "Are there other ways to solve this problem?"
    validations:
      required: false
  
  - type: textarea
    id: additional_context
    attributes:
      label: "Additional Context"
      description: "Add any other context, examples, or references"
      placeholder: "Add any additional context or examples here..."
    validations:
      required: false
