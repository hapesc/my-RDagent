# Runtime identity / storage
env: dev
# Default scenario name used when `rdagent run` does not receive `--scenario`
default_scenario: data_science
# Root directory for artifacts, checkpoints, and exception archives
artifact_root: /tmp/rd_agent_artifacts
# Root directory for per-run workspaces
workspace_root: /tmp/rd_agent_workspace
# Trace event log path
trace_storage_path: /tmp/rd_agent_trace/events.jsonl
# SQLite metadata store path
sqlite_path: /tmp/rd_agent.sqlite3
# Allow local execution when Docker is unavailable
allow_local_execution: false
# Python logging level for the application
log_level: INFO

# LLM provider configuration
llm_provider: litellm
# Keep secrets in env vars; null means "read from environment only"
llm_api_key: null
# Default model identifier passed to LiteLLM
llm_model: openai/gpt-4o-mini
# Optional custom LiteLLM / OpenAI-compatible base URL
llm_base_url: null
# Max CoSTEER coding rounds per iteration
costeer_max_rounds: 1

# Search / planning / loop heuristics
mcts_exploration_weight: 1.41
# PUCT constant used by the branch scheduler
mcts_c_puct: 1.41
# Reward aggregation mode for branch selection
mcts_reward_mode: score_based
# Default sandbox timeout for code execution
sandbox_timeout_sec: 120
# Number of layer-0 candidates to generate
layer0_n_candidates: 1
# Number of layer-0 candidates to keep forward
layer0_k_forward: 1
# Relative score threshold for branch pruning
prune_threshold: 0.5

# Debug / optional runtime features
debug_mode: false
# Fraction of data used when debug sampling is enabled
debug_sample_fraction: 0.1
# Max training epochs when debug mode is active
debug_max_epochs: 5
# Enable hypothesis persistence in MemoryService
enable_hypothesis_storage: false
# Let planner use LLM-backed planning instead of rules only
use_llm_planning: false

# Default run parameters merged into `rdagent run`
run_defaults:
  # Scenario used when CLI does not pass `--scenario`
  scenario: data_science
  stop_conditions:
    # Max outer loop iterations for one run
    max_loops: 1
    # Total wall-clock budget for a run in seconds
    max_duration_sec: 300
  step_overrides:
    running:
      # Per-step execution timeout override in seconds
      timeout_sec: 120
  entry_input:
    # Default row identifier column for `data_science`
    id_column: id
    # Default target column for `data_science`
    label_column: label
